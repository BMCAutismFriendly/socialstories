            var english={
                "title":"Getting a PICC Line",
                "line1":"This story is about getting a PICC Line.",
                "line2":"A PICC line is a small, flexible tube that stays in my arm. It helps my body get the special water and vitamins I need to feel strong!",
                "line3":"First, I will go to a room with a cozy bed. I can remember to take deep breaths to help me feel calm while waiting for the friendly doctors to arrive.",
                "line4":"Then I will meet the doctors. They might be wearing a blue hat, mask, and blue clothes called scrubs. They may ask me and my family questions. We can ask them questions too.",
                "line5":"The nurse will wash my arm with a cold sponge. Then they will put a paper "tent" over my arm.",
                "line6":"The doctor will help me feel very relaxed. I might take a little nap, or they will use a cream to make my arm feel sleepy. My arm might feel heavy or numb, like it's fallen asleep.",
                "line7":"The doctor uses a special camera to look inside my arm. They will use some cool gel and a smooth wand. I can see black and white pictures on the screen.",
                "line8":"Next, the Doctor will place a rubber band on my arm.",
                "line9":"The doctor will gently slide a tube into my arm. I might feel a little pressure, but it won't be painful.",
                "line10":"When we are done, the nurse will put a clear, shiny sticker over my arm to keep the tube safe. They might also give me a soft, stretchy sleeve. Now my PICC line is all done, and I was super brave today!",
